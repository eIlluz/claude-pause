<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300" font-family="Manrope, sans-serif">
  <!-- Browser window frame -->
  <rect x="0" y="0" width="400" height="300" rx="16" fill="#fafaf5"/>
  <!-- Top bar -->
  <rect x="0" y="0" width="400" height="36" rx="16" fill="#e8e8e2"/>
  <rect x="0" y="20" width="400" height="16" fill="#e8e8e2"/>
  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="36" cy="18" r="5" fill="#febc2e"/>
  <circle cx="52" cy="18" r="5" fill="#28c840"/>
  <!-- Address bar -->
  <rect x="100" y="10" width="200" height="16" rx="8" fill="#d4d4ce"/>

  <!-- Card content area -->
  <!-- Title -->
  <text x="200" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#2b685a">Neck Stretch</text>
  <text x="200" y="90" text-anchor="middle" font-size="11" fill="#7cb9a8">15 seconds per side</text>

  <!-- Head icon (tilted right) -->
  <g transform="translate(200, 165) rotate(18)">
    <!-- Neck -->
    <rect x="-8" y="34" width="16" height="22" rx="5" fill="#b0efdd"/>
    <!-- Head -->
    <ellipse cx="0" cy="14" rx="30" ry="34" fill="#b0efdd"/>
    <!-- Face details -->
    <ellipse cx="-9" cy="10" rx="4" ry="5" fill="#7cb9a8"/>
    <ellipse cx="9" cy="10" rx="4" ry="5" fill="#7cb9a8"/>
    <path d="M -8 24 Q 0 30 8 24" stroke="#7cb9a8" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Tilt arrow indicator -->
  <path d="M 260 148 Q 275 140 272 155" stroke="#2b685a" stroke-width="2" fill="none" stroke-linecap="round"/>
  <polygon points="270,155 278,150 276,160" fill="#2b685a"/>

  <!-- Countdown -->
  <text x="200" y="248" text-anchor="middle" font-size="42" font-weight="800" fill="#2b685a">15</text>
  <text x="200" y="268" text-anchor="middle" font-size="11" fill="#7cb9a8">Tilt your head gently to the right</text>

  <!-- Skip button -->
  <text x="370" y="58" text-anchor="end" font-size="11" fill="#7cb9a8">not now</text>
</svg>

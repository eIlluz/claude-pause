<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Wellness Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2b685a;
    --primary-container: #7cb9a8;
    --primary-fixed: #b0efdd;
    --surface: #fafaf5;
    --surface-container-low: #f4f4ef;
    --surface-container: #eeeee9;
    --on-surface: #1a1c19;
    --on-surface-variant: #404945;
    --outline-variant: #c0c9c4;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --primary: #7cb9a8;
      --primary-container: #2b685a;
      --primary-fixed: #1a4a3e;
      --surface: #1a1c19;
      --surface-container-low: #222420;
      --surface-container: #2a2c28;
      --on-surface: #e3e3de;
      --on-surface-variant: #bfc9c4;
      --outline-variant: #404945;
    }
    .bg-glow {
      background:
        radial-gradient(ellipse 80% 60% at 30% 40%, rgba(43,104,90,0.15), transparent),
        radial-gradient(ellipse 70% 50% at 70% 60%, rgba(124,185,168,0.08), transparent);
    }
    .drop-zone {
      border-color: var(--outline-variant) !important;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--primary) !important;
      background: rgba(43,104,90,0.15) !important;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--surface);
    color: var(--on-surface);
    min-height: 100vh;
    position: relative;
  }

  .bg-glow {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 30% 40%, rgba(176,239,221,0.25), transparent),
      radial-gradient(ellipse 70% 50% at 70% 60%, rgba(124,185,168,0.15), transparent);
    animation: driftBg 20s ease-in-out infinite alternate;
  }

  @keyframes driftBg {
    0%   { transform: translate(0, 0) scale(1); }
    50%  { transform: translate(-20px, 15px) scale(1.05); }
    100% { transform: translate(15px, -10px) scale(1.02); }
  }

  /* ── Landing screen ── */
  #landing {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2.5rem;
    padding: 2rem;
  }

  .landing-title {
    font-size: 2.4rem;
    font-weight: 600;
    color: var(--primary);
    text-align: center;
    animation: fadeUp 0.8s ease both;
  }

  .landing-sub {
    font-size: 1rem;
    color: var(--on-surface-variant);
    text-align: center;
    animation: fadeUp 0.8s ease 0.15s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .drop-zone {
    animation: fadeUp 0.8s ease 0.3s both;
    width: min(480px, 100%);
    border: 2px dashed var(--outline-variant);
    border-radius: 20px;
    background: var(--surface-container-low);
    padding: 3rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s, transform 0.2s;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--primary);
    background: rgba(176,239,221,0.25);
    transform: scale(1.01);
  }

  .drop-icon {
    width: 56px;
    height: 56px;
    opacity: 0.7;
  }

  .drop-label {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--on-surface);
  }

  .drop-hint {
    font-size: 0.82rem;
    color: var(--on-surface-variant);
    font-family: 'Menlo', 'Monaco', monospace;
    background: var(--surface-container);
    padding: 0.3rem 0.75rem;
    border-radius: 8px;
  }

  .drop-click {
    font-size: 0.82rem;
    color: var(--on-surface-variant);
  }

  #fileInput { display: none; }

  /* ── Dashboard ── */
  #dashboard {
    display: none;
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  #dashboard.visible { display: block; }

  .dash-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .dash-title {
    font-size: 2rem;
    font-weight: 600;
    color: var(--primary);
  }

  .refresh-btn {
    font-family: 'Manrope', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--primary);
    background: var(--surface-container-low);
    border: 1.5px solid var(--outline-variant);
    border-radius: 10px;
    padding: 0.5rem 1.1rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .refresh-btn:hover {
    background: rgba(176,239,221,0.3);
    border-color: var(--primary);
  }

  /* ── Section headings ── */
  .section-title {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--on-surface-variant);
    margin-bottom: 1rem;
  }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  @media (max-width: 560px) {
    .stats-bar { grid-template-columns: 1fr; }
  }

  .stat-box {
    background: var(--surface-container-low);
    border-radius: 16px;
    padding: 1.4rem 1.2rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    border: 1px solid var(--outline-variant);
    transition: transform 0.2s;
  }

  .stat-box:hover { transform: translateY(-2px); }

  .stat-label {
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--on-surface-variant);
  }

  .stat-value {
    font-size: 2.2rem;
    font-weight: 700;
    color: var(--primary);
    line-height: 1.1;
  }

  .stat-sub {
    font-size: 0.82rem;
    color: var(--on-surface-variant);
  }

  /* ── Bar chart ── */
  .section {
    background: var(--surface-container-low);
    border-radius: 16px;
    padding: 1.5rem 1.4rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--outline-variant);
  }

  .bar-chart {
    display: flex;
    flex-direction: column;
    gap: 0.7rem;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 140px 1fr 2.5rem;
    align-items: center;
    gap: 0.75rem;
  }

  @media (max-width: 480px) {
    .bar-row { grid-template-columns: 110px 1fr 2rem; }
  }

  .bar-name {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--on-surface);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    background: var(--surface-container);
    border-radius: 100px;
    height: 10px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 100px;
    background: var(--primary-container);
    transition: width 0.9s cubic-bezier(0.25, 1, 0.5, 1);
    min-width: 4px;
  }

  .bar-count {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--on-surface-variant);
    text-align: right;
  }

  /* ── Timeline ── */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .timeline-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.7rem 0;
    border-bottom: 1px solid var(--outline-variant);
  }

  .timeline-item:last-child { border-bottom: none; }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .timeline-name {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--on-surface);
  }

  .timeline-time {
    font-size: 0.8rem;
    color: var(--on-surface-variant);
    white-space: nowrap;
  }

  /* ── Heatmap ── */
  .heatmap-wrap {
    overflow-x: auto;
  }

  .heatmap-grid {
    display: grid;
    grid-template-columns: 36px repeat(28, 1fr);
    gap: 4px;
    min-width: 360px;
  }

  .heatmap-day-label {
    font-size: 0.7rem;
    color: var(--on-surface-variant);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 4px;
    height: 22px;
  }

  .heatmap-cell {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 4px;
    background: var(--surface-container);
    transition: background 0.3s;
    position: relative;
    cursor: default;
  }

  .heatmap-cell[title]:hover::after {
    content: attr(title);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--on-surface);
    color: var(--surface);
    font-size: 0.72rem;
    padding: 3px 7px;
    border-radius: 6px;
    white-space: nowrap;
    z-index: 10;
    pointer-events: none;
  }

  .heat-0 { background: var(--surface-container); }
  .heat-1 { background: rgba(176,239,221,0.6); }
  .heat-2 { background: var(--primary-container); opacity: 0.75; }
  .heat-3 { background: var(--primary-container); }
  .heat-4 { background: var(--primary); opacity: 0.85; }

  @media (prefers-color-scheme: dark) {
    .heat-1 { background: rgba(43,104,90,0.5); }
    .heat-2 { background: rgba(43,104,90,0.75); }
    .heat-3 { background: var(--primary-container); }
    .heat-4 { background: var(--primary); opacity: 0.9; }
  }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--on-surface-variant);
    font-size: 0.95rem;
    line-height: 1.7;
  }

  .empty-state strong {
    display: block;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--on-surface);
    margin-bottom: 0.5rem;
  }

  /* ── Date header row above heatmap columns ── */
  .heatmap-month-row {
    display: grid;
    grid-template-columns: 36px repeat(28, 1fr);
    gap: 4px;
    margin-bottom: 2px;
    min-width: 360px;
  }

  .heatmap-col-label {
    font-size: 0.62rem;
    color: var(--on-surface-variant);
    text-align: center;
    overflow: hidden;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="bg-glow"></div>

  <!-- Landing / drop zone -->
  <div id="landing">
    <div>
      <div class="landing-title">Your Wellness Journey</div>
      <div class="landing-sub" style="margin-top:0.5rem">See how far you've come, one pause at a time.</div>
    </div>

    <div class="drop-zone" id="dropZone" role="button" tabindex="0" aria-label="Drop wellness history file">
      <svg class="drop-icon" viewBox="0 0 56 56" fill="none">
        <circle cx="28" cy="28" r="24" fill="var(--primary-fixed)" opacity="0.5"/>
        <path d="M28 18 v14 M22 26 l6 6 6-6" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M20 38 h16" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
      </svg>
      <div class="drop-label">Drop your .wellness_history.json here</div>
      <div class="drop-hint">~/.claude/scripts/.wellness_history.json</div>
      <div class="drop-click">or click to browse</div>
    </div>

    <input type="file" id="fileInput" accept=".json,application/json">
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <div class="dash-header">
      <div class="dash-title">Your Wellness Journey</div>
      <button class="refresh-btn" id="refreshBtn">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M12 2.5A6 6 0 1 0 13 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M13 3 V7 H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Load newer file
      </button>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar"></div>

    <!-- Exercise breakdown -->
    <div class="section" id="breakdownSection">
      <div class="section-title">Exercise breakdown</div>
      <div class="bar-chart" id="barChart"></div>
    </div>

    <!-- Recent activity -->
    <div class="section" id="recentSection">
      <div class="section-title">Recent activity</div>
      <div class="timeline" id="timeline"></div>
    </div>

    <!-- Weekly heatmap -->
    <div class="section">
      <div class="section-title">Last 4 weeks</div>
      <div class="heatmap-wrap">
        <div class="heatmap-month-row" id="heatmapMonthRow"></div>
        <div class="heatmap-grid" id="heatmapGrid"></div>
      </div>
    </div>
  </div>

<script>
// ── Dot colours per exercise slug ──────────────────────────────────────────
const SLUG_COLORS = {
  'box-breathing':  '#7cb9a8',
  'neck-stretch':   '#a8c5b0',
  'eye-rest':       '#b0efdd',
  'posture-check':  '#5a9e8a',
  'breathing-478':  '#4a8a78',
  'shoulder-roll':  '#8fd0bc',
  'blink-reset':    '#c5e8df',
  'spine-stretch':  '#6aac97',
};

function dotColor(slug) {
  return SLUG_COLORS[slug] || '#7cb9a8';
}

// ── Relative time ──────────────────────────────────────────────────────────
function relativeTime(epoch) {
  const now = Date.now() / 1000;
  const diff = now - epoch;
  if (diff < 60)         return 'just now';
  if (diff < 3600)       return `${Math.floor(diff/60)}m ago`;
  if (diff < 7200)       return '1 hour ago';
  if (diff < 86400)      return `${Math.floor(diff/3600)} hours ago`;
  if (diff < 172800)     return 'yesterday';
  if (diff < 604800)     return `${Math.floor(diff/86400)} days ago`;
  const weeks = Math.floor(diff/604800);
  return weeks === 1 ? '1 week ago' : `${weeks} weeks ago`;
}

// ── Parse & render ─────────────────────────────────────────────────────────
function renderDashboard(history) {
  // Sort oldest → newest for streak calc; reverse for recency
  const sorted = [...history].sort((a,b) => a.epoch - b.epoch);

  // ── Stats ─────────────────────────────────────────────────────────────
  const total = history.length;

  // Current streak: consecutive calendar days with ≥1 exercise up to today
  function dayKey(epoch) {
    const d = new Date(epoch * 1000);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }
  const todayKey = dayKey(Date.now()/1000);
  const daySet = new Set(sorted.map(e => dayKey(e.epoch)));
  let streak = 0;
  const msPerDay = 86400000;
  let cursor = new Date(); cursor.setHours(0,0,0,0);
  // Allow streak to count today even if no exercise yet today by checking yesterday too
  if (!daySet.has(dayKey(cursor.getTime()/1000))) cursor = new Date(cursor.getTime() - msPerDay);
  while (daySet.has(dayKey(cursor.getTime()/1000))) {
    streak++;
    cursor = new Date(cursor.getTime() - msPerDay);
  }

  // Most practiced
  const counts = {};
  history.forEach(e => { counts[e.slug] = (counts[e.slug]||0) + 1; });
  const topSlug = Object.keys(counts).sort((a,b) => counts[b]-counts[a])[0];
  const topEntry = history.find(e => e.slug === topSlug);
  const topTitle = topEntry ? topEntry.title : '—';
  const topCount = topSlug ? counts[topSlug] : 0;

  // Render stats
  const statsBar = document.getElementById('statsBar');
  statsBar.innerHTML = `
    <div class="stat-box">
      <div class="stat-label">Total completed</div>
      <div class="stat-value">${total}</div>
      <div class="stat-sub">exercises done</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Current streak</div>
      <div class="stat-value">${streak}</div>
      <div class="stat-sub">${streak === 1 ? 'day' : 'days'} in a row</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Most practiced</div>
      <div class="stat-value" style="font-size:1.4rem;line-height:1.25">${topTitle}</div>
      <div class="stat-sub">${topCount > 0 ? `${topCount}× completed` : '—'}</div>
    </div>
  `;

  // ── Bar chart ────────────────────────────────────────────────────────
  const barChart = document.getElementById('barChart');
  if (total === 0) {
    barChart.innerHTML = '<div class="empty-state"><strong>No exercises yet</strong>They\'ll show up as you use claude-pause.</div>';
  } else {
    const maxCount = Math.max(...Object.values(counts));
    const sortedSlugs = Object.keys(counts).sort((a,b) => counts[b]-counts[a]);
    barChart.innerHTML = sortedSlugs.map(slug => {
      const entry = history.find(e => e.slug === slug);
      const title = entry ? entry.title : slug;
      const pct = (counts[slug] / maxCount) * 100;
      return `
        <div class="bar-row">
          <div class="bar-name" title="${title}">${title}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:0%" data-target="${pct.toFixed(1)}"></div>
          </div>
          <div class="bar-count">${counts[slug]}</div>
        </div>`;
    }).join('');
    // Animate bars after paint
    requestAnimationFrame(() => requestAnimationFrame(() => {
      document.querySelectorAll('.bar-fill').forEach(el => {
        el.style.width = el.dataset.target + '%';
      });
    }));
  }

  // ── Timeline ─────────────────────────────────────────────────────────
  const timeline = document.getElementById('timeline');
  const recent = [...history].sort((a,b) => b.epoch - a.epoch).slice(0, 10);
  if (recent.length === 0) {
    timeline.innerHTML = '<div class="empty-state"><strong>No exercises yet</strong>They\'ll show up as you use claude-pause.</div>';
  } else {
    timeline.innerHTML = recent.map(e => `
      <div class="timeline-item">
        <div class="dot" style="background:${dotColor(e.slug)}"></div>
        <div class="timeline-name">${e.title}</div>
        <div class="timeline-time">${relativeTime(e.epoch)}</div>
      </div>`).join('');
  }

  // ── Heatmap: last 28 days ────────────────────────────────────────────
  // Build map: "YYYY-M-D" → count
  const heatData = {};
  history.forEach(e => { const k = dayKey(e.epoch); heatData[k] = (heatData[k]||0)+1; });

  // 28 days ending today, column = day index (0..27), row = day-of-week (0=Mon..6=Sun)
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for (let i = 27; i >= 0; i--) {
    const d = new Date(today.getTime() - i * msPerDay);
    days.push(d);
  }

  // Organise as 7 rows × 4 cols (Mon..Sun, week columns)
  // days[0] is 27 days ago; we want Mon on top.
  // We'll render column-major: 4 weeks × 7 days per week.
  // First figure out which weekday days[0] falls on (0=Mon).
  function isoWeekday(d) { return (d.getDay() + 6) % 7; } // 0=Mon

  // Build 7-row × 4-col matrix filled with null placeholders
  // Then fill: the first day of our window determines column offsets.
  // Simpler approach: render as a flat 28 cells in a 7-row × 4-col CSS grid
  // col = Math.floor(i/7), row = i%7 — but we want Mon on row 0.
  // Let's pad so that day[0] aligns to its actual weekday.

  const startWeekday = isoWeekday(days[0]); // 0..6
  const TOTAL_COLS = 4;
  const TOTAL_ROWS = 7;
  // We use 4 full columns = 28 cells, no padding needed since we have exactly 28 days.
  // Map day index to [col, row]: col=floor(i/7), row=i%7? No—we want rows=Mon..Sun.
  // Actually the natural reading: col 0 = week starting 28d ago, row = day-of-week.
  // So: for days[i], row = isoWeekday(days[i]), col = Math.floor(i/7).
  // But that only works if days[0] is a Monday. Since we take the last 28 days ending today,
  // we may start mid-week. We'll just lay them out sequentially left→right, top→bottom
  // matching the 7-row grid with Mon labels.

  // Grid: 7 rows × up to 5 cols to handle any start day + 28 days
  // Total cells needed: startWeekday + 28, rounded up to multiple of 7
  const cellsBefore = startWeekday;
  const totalCells = cellsBefore + 28;
  const numCols = Math.ceil(totalCells / 7);

  const DAY_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  // Month row: show month name at each column where the week starts
  const heatmapMonthRow = document.getElementById('heatmapMonthRow');
  heatmapMonthRow.style.gridTemplateColumns = `36px repeat(${numCols}, 1fr)`;
  let monthRowHTML = '<div></div>'; // spacer for label column
  for (let c = 0; c < numCols; c++) {
    const firstCellIndex = c * 7 - cellsBefore; // index into days[]
    const firstDayInCol = firstCellIndex >= 0 ? days[firstCellIndex] : null;
    if (firstDayInCol) {
      // Show month label only when month changes from previous col
      const prevCellIndex = (c-1)*7 - cellsBefore;
      const prevDay = (c > 0 && prevCellIndex >= 0) ? days[prevCellIndex] : null;
      const showMonth = !prevDay || prevDay.getMonth() !== firstDayInCol.getMonth();
      monthRowHTML += `<div class="heatmap-col-label">${showMonth ? MONTH_NAMES[firstDayInCol.getMonth()] : ''}</div>`;
    } else {
      monthRowHTML += '<div class="heatmap-col-label"></div>';
    }
  }
  heatmapMonthRow.innerHTML = monthRowHTML;

  // Heatmap grid: 7 rows, numCols data cols + 1 label col
  const heatmapGrid = document.getElementById('heatmapGrid');
  heatmapGrid.style.gridTemplateColumns = `36px repeat(${numCols}, 1fr)`;

  let gridHTML = '';
  for (let row = 0; row < 7; row++) {
    gridHTML += `<div class="heatmap-day-label">${DAY_LABELS[row]}</div>`;
    for (let col = 0; col < numCols; col++) {
      const cellIndex = col * 7 + row - cellsBefore;
      if (cellIndex < 0 || cellIndex >= 28) {
        gridHTML += '<div class="heatmap-cell heat-0" style="opacity:0.25"></div>';
      } else {
        const d = days[cellIndex];
        const k = dayKey(d.getTime()/1000);
        const cnt = heatData[k] || 0;
        const heatClass = cnt === 0 ? 'heat-0' : cnt === 1 ? 'heat-1' : cnt === 2 ? 'heat-2' : cnt >= 3 ? (cnt >= 4 ? 'heat-4' : 'heat-3') : 'heat-0';
        const label = `${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}: ${cnt} exercise${cnt!==1?'s':''}`;
        const isToday = k === dayKey(Date.now()/1000);
        const todayStyle = isToday ? 'outline:2px solid var(--primary);outline-offset:1px;' : '';
        gridHTML += `<div class="heatmap-cell ${heatClass}" title="${label}" style="${todayStyle}"></div>`;
      }
    }
  }
  heatmapGrid.innerHTML = gridHTML;

  // ── Show dashboard ────────────────────────────────────────────────────
  document.getElementById('landing').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.classList.add('visible');
  dash.style.opacity = '0';
  requestAnimationFrame(() => {
    dash.style.transition = 'opacity 0.6s ease';
    dash.style.opacity = '1';
  });
}

// ── File handling ──────────────────────────────────────────────────────────
function loadFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      const history = Array.isArray(data) ? data : [];
      renderDashboard(history);
    } catch (err) {
      alert('Could not parse file. Make sure it is a valid .wellness_history.json.');
    }
  };
  reader.readAsText(file);
}

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });

fileInput.addEventListener('change', (e) => loadFile(e.target.files[0]));

dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  loadFile(e.dataTransfer.files[0]);
});

// Refresh button
document.getElementById('refreshBtn').addEventListener('click', () => {
  document.getElementById('dashboard').classList.remove('visible');
  document.getElementById('dashboard').style.display = '';
  document.getElementById('landing').style.display = '';
  fileInput.value = '';
});
</script>
